{% load static %}
<section id="personal-material-widget"
         class="personal-material-widget"
         data-list-url="{% url 'slm:personalmaterial-list' %}"
         data-create-url="{% url 'slm:personalmaterial-create' %}"
         data-update-url="{% url 'slm:personalmaterial-update' 0 %}"
         data-delete-url="{% url 'slm:personalmaterial-delete' 0 %}"
         data-file-replace-url="{% url 'slm:personalmaterial-file-replace' 0 %}">

    <div class="toast-container" aria-live="polite"></div>

    <!-- **Add new material** – only for logged‑in users -->
    
    <section class="pm-form-card" aria-label="Add learning material">
        <div class="pm-form__header">
            <h3>Add a new material</h3>
            <p>Upload a PDF, DOCX or PPTX and optionally make it public.</p>
        </div>
        <form class="pm-form">
            <input id="pm-title-input" type="text" placeholder="Title" required>
            <select id="pm-visibility-select">
                <option value="PR">Private (only me)</option>
                <option value="PU">Public (any logged‑in user)</option>
            </select>
            <input id="pm-file-input" type="file"
                   accept=".pdf,.doc,.docx,.ppt,.pptx" required>
            <button id="pm-add-btn" type="button">Add material</button>
        </form>
    </section>

    <div class="pm-filter-row">
        <label>
            Visibility
            <select id="pm-filter-visibility-select">
                <option value="own">My materials</option>
                <option value="public">Public materials</option>
                <option value="all">All materials</option>
            </select>
        </label>
        <label>
            File type
            <select id="pm-filter-type-select">
                <option value="all">All types</option>
                <option value="pdf">PDF</option>
                <option value="doc">Word</option>
                <option value="ppt">PowerPoint</option>
            </select>
        </label>
    </div>

    <!-- List that will be filled by the widget -->
    <div id="personal-material-list"></div>

    <div id="pm-edit-modal" class="modal modal--edit hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__content">
        <h2>Edit material</h2>
        <form id="pm-edit-form">
        <label>
            Title
            <input type="text" name="title" required>
        </label>

        <label>
            Visibility
            <select name="visibility">
            <option value="PR">Private</option>
            <option value="PU">Public</option>
            </select>
        </label>

        <label>
            Replace file (optional)
            <input type="file" name="file" accept=".pdf,.doc,.docx,.ppt,.pptx">
        </label>

        <div class="modal__actions">
            <button type="submit" class="button-primary">Save</button>
            <button type="button" class="button-plain" id="pm-cancel">Cancel</button>
        </div>
        </form>
    </div>
    </div>

    <!-- ==================== DELETE MODAL ==================== -->
    <div id="pm-delete-modal" class="modal modal--delete hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__content">
        <h2>Delete material</h2>
        <p>Are you sure you want to delete this material? This action cannot be undone.</p>
        <div class="modal__actions">
        <button type="button" class="button-primary button--danger" id="pm-delete-confirm">Delete</button>
        <button type="button" class="button-plain" id="pm-delete-cancel">Cancel</button>
        </div>
    </div>
    </div>
</section>

<script type="module">
    import { initPersonalMaterialWidget } from "{% static 'js/slm/personal_material_ajax.js' %}";
    const root = document.getElementById('personal-material-widget');
    initPersonalMaterialWidget(root);
</script>
