{% load static %}

<div id="subject-widget"
     class="subject-widget"
     data-list-url="{% url 'slm:subject-list' %}"
     data-create-url="{% url 'slm:subject-create' %}"
     data-update-url="{% url 'slm:subject-update' 0 %}"      {# ← dummy 0 #}
     data-delete-url="{% url 'slm:subject-delete' 0 %}"      {# ← dummy 0 #}>

    <!-- Status line (ARIA live) -->
    <p id="subject-status" aria-live="polite"></p>

    <!-- Optional “Add subject” form – only visible to the *owner* -->
    <section class="subject-form-card" aria-label="Add subject form">
        <div class="subject-form-card__header">
            <div>
                <h3>Add a new subject</h3>
                <span>Create a new learning subject for others to explore.</span>
            </div>
        </div>
        <div class="subject-form-card__body">
            <input type="text" id="code-input" placeholder="Subject code (e.g. GEC101)">
            <input type="text" id="name-input" placeholder="Subject name">
            <select id="year-select"></select>   {# will be populated by JS #}
            <button type="button" id="add-btn">Add subject</button>
        </div>
        <p id="status" class="subject-status"></p>
    </section>


    <!-- The list that the widget will fill -->
    <div id="subject-list"></div>

    <!-- Empty modal placeholder – the script will populate it -->
    <div id="subject-edit-modal" class="modal hidden"></div>
</div>

<script type="module">
    import { initSubjectWidget } from "{% static 'js/slm/subject_ajax.js' %}";
    const widget = document.getElementById('subject-widget');
    initSubjectWidget(widget);
</script>
