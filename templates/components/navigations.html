{% load static %}
<aside id="sidebar" class="sidebar Sidebar" role="navigation" aria-label="Primary navigation">
  <div class="sidebar-header">
    <button type="button" class="sidebar-trigger" aria-controls="sidebar" aria-expanded="true" aria-label="Collapse navigation sidebar">
      <span class="sr-only">Toggle sidebar</span>
      <svg class="sidebar-trigger-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <h2 class="sidebar-logo">EduAlly</h2>
  </div>

  <nav class="sidebar-nav">
    <a href="{% url 'account:dashboard' %}" class="nav-item {% if request.resolver_match.view_name == 'account:dashboard' %}active{% endif %}">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-label">Dashboard</span>
    </a>
    <a href="{% url 'aihelper:helper' %}" class="nav-item {% if request.resolver_match.view_name == 'aihelper:helper' %}active{% endif %}">
      <i class="fas fa-brain nav-icon"></i>
      <span class="nav-label">AI Helper</span>
    </a>
    <a href="{% url 'forum:feed' %}" class="nav-item {% if request.resolver_match.view_name == 'forum:feed' %}active{% endif %}">
      <i class="fas fa-comments nav-icon"></i>
      <span class="nav-label">Forum</span>
    </a>
    <a href="{% url 'slm:slmlists' %}" class="nav-item {% if request.resolver_match.view_name == 'slm:slmlists' %}active{% endif %}">
      <i class="fas fa-book nav-icon"></i>
      <span class="nav-label">Modules</span>
    </a>
    <a href="{% url 'account:profile' %}" class="nav-item {% if request.resolver_match.view_name == 'account:profile' %}active{% endif %}">
      <i class="fas fa-user-circle nav-icon"></i>
      <span class="nav-label">Profile</span>
    </a>
    <a href="{% url 'account:settings' %}" class="nav-item {% if request.resolver_match.view_name == 'account:settings' %}active{% endif %}">
      <i class="fas fa-cog nav-icon"></i>
      <span class="nav-label">Settings</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <form method="post" action="{% url 'account:logout' %}">
      {% csrf_token %}
      <button type="submit" class="nav-item logout">
        <i class="fas fa-sign-out-alt nav-icon"></i>
        <span class="nav-label">Logout</span>
      </button>
    </form>
  </div>
</aside>
<script src="{% static 'js/sidebar-toggle.js' %}" defer></script>
