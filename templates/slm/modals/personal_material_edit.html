<div class="modal__backdrop" data-close-modal></div>
<div class="modal__content">
    <h2>Edit material</h2>
    <form method="post"
          enctype="multipart/form-data"
          action="{% url 'slm:personalmaterial-edit-modal' pm.id %}"
          data-modal-form>
        {% csrf_token %}
        <input type="hidden" name="pm_id" value="{{ pm.id }}">

        <label>
            Title
            <input type="text" name="title" value="{{ pm.title }}" required>
        </label>

        <label>
            Visibility
            <select name="visibility">
                {% for val, label in pm.Visibility.choices %}
                <option value="{{ val }}" {% if val == pm.visibility %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Replace file (optional)
            <input type="file" name="file" accept=".pdf,.doc,.docx,.ppt,.pptx">
        </label>

        <div class="modal__actions">
            <button type="submit" class="button-primary">Save</button>
            <button type="button" class="button-plain" data-close-modal>Cancel</button>
        </div>
    </form>
</div>
