{% load static %}
<section id="public-material-widget"
         class="personal-material-widget"
         data-list-url="{% url 'slm:personalmaterial-list' %}"
         data-create-url="{% url 'slm:personalmaterial-create' %}"
         data-update-url="{% url 'slm:personalmaterial-update' 0 %}"
         data-delete-url="{% url 'slm:personalmaterial-delete' 0 %}"
         data-file-replace-url="{% url 'slm:personalmaterial-file-replace' 0 %}"
         data-visibility="public"><!-- hint for the widget -->

    <div class="toast-container" aria-live="polite"></div>

    <!-- No “add” form – public page is *read‑only* for non‑owners -->
    {% if request.user.is_authenticated %}
    <section class="pm-form-card" aria-label="Upload material to the public library">
        <div class="pm-form__header">
            <h3>Contribute a public material</h3>
            <p>Upload a file and make it visible to the whole community.</p>
        </div>
        <form class="pm-form">
            <input id="pm-title-input" type="text" placeholder="Title" required>
            <input id="pm-file-input" type="file"
                   accept=".pdf,.doc,.docx,.ppt,.pptx" required>
            <!-- visibility is forced to PUBLIC – hidden field -->
            <input type="hidden" id="pm-visibility-select" value="PU">
            <button id="pm-add-btn" type="button">Add to public library</button>
        </form>
    </section>
    {% endif %}

    <div class="pm-filter-row">
        <label>
            File type
            <select id="pm-filter-type-select">
                <option value="all">All types</option>
                <option value="pdf">PDF</option>
                <option value="doc">Word</option>
                <option value="ppt">PowerPoint</option>
            </select>
        </label>
    </div>

    <div id="personal-material-list"></div>
    <div id="pm-edit-modal" class="modal hidden"></div>
</section>

<script type="module">
    import { initPersonalMaterialWidget } from "{% static 'js/slm/personal_material_ajax.js' %}";
    const root = document.getElementById('public-material-widget');
    // the widget will see the custom data‑attribute “data-visibility” and
    // will request only public items.
    initPersonalMaterialWidget(root);
</script>
