{% load static %}
{% load account_extras %}

<div id="subject-widget"
     class="subject-widget"
     data-list-url="{% url 'slm:subject-list' %}"
     data-create-url="{% url 'slm:subject-create' %}"
     data-update-url="{% url 'slm:subject-update' 0 %}"
     data-delete-url="{% url 'slm:subject-delete' 0 %}">

    <!-- Toast container – the script will also create it automatically if you delete this line -->
    <div class="toast-container" aria-live="polite"></div>

    {% if request.user|has_group:'Teacher' %}
    <section class="subject-form-card" aria-label="Add subject form">
        <div class="subject-form-card__header">
            <div>
                <h3>Add a new subject</h3>
                <span>Create a new learning subject for others to explore.</span>
            </div>
        </div>
        <form id="subject-form" class="subject-form">
            <input id="code-input"
                type="text"
                placeholder="Subject code (e.g. GEC101)"
                required>
            <input id="name-input"
                type="text"
                placeholder="Subject name"
                required>
            <select id="year-select" required></select>
            <button id="add-btn" type="submit">Add subject</button>
        </form>
    </section>
    {% endif %}

    <!-- The list that the widget will fill -->
    <div id="subject-list"></div>
</div>

<script type="module">
    import { initSubjectWidget } from "{% static 'js/slm/subject_ajax.js' %}";
    const widget = document.getElementById('subject-widget');
    initSubjectWidget(widget);
</script>
