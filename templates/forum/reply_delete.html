{% load static %}
<div class="create-post-container">
    <h2>Delete Reply?</h2>
    <p class="intro-text">Are you sure you want to delete this reply? This action cannot be undone.</p>

    <div style="background: rgba(211, 47, 47, 0.1); padding: 12px; border-radius: 8px; margin: 16px 0; border-left: 4px solid #d32f2f;">
        <strong>"{{ reply.content|truncatewords:10 }}"</strong>
    </div>

    <form method="post" action="{% url 'forum:reply_delete' reply.pk %}" class="ajax-form" data-target="#global-modal">
        {% csrf_token %}
        <div class="form-actions" style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
            <button type="button" class="button secondary-button" onclick="document.getElementById('global-modal').classList.remove('open');">
                Cancel
            </button>
            <button type="submit" class="button" style="background-color: #d32f2f; color: white;">
                <i class="fa-solid fa-trash"></i> Delete Reply
            </button>
        </div>
    </form>
</div>
