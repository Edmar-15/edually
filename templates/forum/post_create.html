{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ask a Question – EduAlly Forum</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/feed.css' %}">
</head>
<body>
<div class="dashboard-container">
    {% include "components/navigations.html" %}

    <aside class="forum-sidebar">
        {% include "components/category_nav.html" %}
    </aside>

    <main class="main-content">
        <section class="forum-page">
            <h2>Ask a New Question</h2>

            <form method="post" class="post-create-form" style="margin-top:1.5rem;">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="button primary-button">Post Question</button>
                <a href="{% url 'forum:feed' %}" class="button">Cancel</a>
            </form>
        </section>
    </main>
</div>
</body>
</html>
