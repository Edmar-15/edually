{# templates/account/logout_confirm.html #}
<div class="modal__dialog" role="document" aria-labelledby="logout-modal-title">
    <header class="modal__header">
        <h2 id="logout-modal-title" class="modal__title">Confirm Logout</h2>
        <button type="button"
                class="modal__close"
                aria-label="Close"
                data-close-modal>&times;</button>
    </header>

    <section class="modal__body">
        <p>Are you sure you want to log out of your EduAlly account?</p>
    </section>

    <footer class="modal__footer">
        <button type="button"
                class="btn btn--secondary"
                data-close-modal>Cancel</button>

        <form method="post"
              action="{% url 'account:logout_confirm' %}"
              class="modal__form"
              data-modal-form>
            {% csrf_token %}
            <button type="submit"
                    class="btn btn--primary">Yes, log me out</button>
        </form>
    </footer>
</div>
